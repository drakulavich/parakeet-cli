name: Install Kesha Backend
description: Restore backend cache, install ffmpeg when needed, and install the Kesha backend

inputs:
  cache-path:
    description: Optional backend cache path(s)
    required: false
    default: ""
  cache-key:
    description: Cache key for the backend cache
    required: false
    default: ""
  cache-restore-keys:
    description: Cache restore key prefix
    required: false
    default: ""
  ffmpeg-provider:
    description: How to install ffmpeg (skip, apt, or brew)
    required: false
    default: skip
  install-args:
    description: Additional arguments for `kesha install`
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: 💾 Cache backend
      if: ${{ inputs.cache-path != '' }}
      uses: actions/cache@v5
      with:
        path: ${{ inputs.cache-path }}
        key: ${{ inputs.cache-key }}
        restore-keys: ${{ inputs.cache-restore-keys }}

    - name: 🎬 Install ffmpeg
      shell: bash
      run: |
        case "${{ inputs.ffmpeg-provider }}" in
          apt) sudo apt-get install -y ffmpeg ;;
          brew) which ffmpeg || brew install ffmpeg ;;
          skip) exit 0 ;;
          *) echo "Unsupported ffmpeg provider: ${{ inputs.ffmpeg-provider }}" >&2; exit 1 ;;
        esac

    - name: 🔊 Install kesha backend
      run: bun link && kesha install ${{ inputs.install-args }}
      shell: bash

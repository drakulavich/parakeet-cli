name: "🔨 Build Engine"

on:
  push:
    # Match real engine-release tags ("v1.0.2") but skip CLI-only marker
    # tags ("v1.0.8-cli"). CLI-only patches do not rebuild the Rust
    # engine — a separate marker release is created manually via
    # `gh release create v<X.Y.Z>-cli --notes-file ...` without
    # triggering this workflow. See CLAUDE.md → RELEASE PROCESS.
    tags:
      - "v*"
      - "!v*-cli"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag, branch, or SHA)"
        required: false
        default: "main"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # system_tts (#141) adds the AVSpeechSynthesizer backend via a
          # Swift sidecar. kesha install places the sidecar next to the
          # engine binary; runtime lookup is sibling-first (see
          # rust/src/tts/avspeech.rs::helper_path).
          # system_diarize (#199) adds the Sortformer streaming-diarization
          # backend via a second Swift sidecar (kesha-diarize). Same
          # sibling-of-engine resolution as AVSpeech (see
          # rust/src/transcribe/diarize.rs::sidecar_path).
          - os: macos-14
            target: aarch64-apple-darwin
            features: coreml,tts,system_tts,system_diarize
            binary: kesha-engine-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: onnx,tts
            binary: kesha-engine-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: onnx,tts
            binary: kesha-engine-windows-x64.exe
    runs-on: ${{ matrix.os }}
    env:
      # Target macOS 14 so the Swift compiler treats concurrency as
      # OS-provided and does not emit an explicit @rpath dependency on
      # libswift_Concurrency.dylib (which no longer ships as a standalone
      # file on macOS 26+).
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 16 (Swift 6)
        if: matrix.os == 'macos-14'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'

      - name: Pin MSVC linker (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        # Git for Windows ships a GNU `link.exe` under /c/Program Files/Git/usr/bin
        # that shadows MSVC's link.exe under `shell: bash`. Pin via cargo's env
        # knob so PATH ordering doesn't matter.
        run: |
          $linkPath = (Get-Command link.exe |
            Where-Object { $_.Source -notlike "*Git*usr*" } |
            Select-Object -First 1).Source
          if (-not $linkPath) { Write-Error "MSVC link.exe not found"; exit 1 }
          Write-Host "MSVC linker: $linkPath"
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linkPath"

      - name: Install system Opus
        # audiopus_sys / opusic-sys (added in #224 for OGG/Opus output) try
        # pkg-config first; on miss they fall back to a vendored libopus
        # cmake build that's incompatible with runner cmake ≥4 (the
        # vendored CMakeLists.txt declares `cmake_minimum_required(<3.5)`).
        # Linux/macOS: install the system lib so pkg-config succeeds and
        # cmake never runs. Windows: pkg-config isn't really there; let
        # the cmake fallback through with a policy override.
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends libopus-dev pkg-config
          elif [[ "${{ matrix.os }}" == "macos-14" ]]; then
            brew install opus pkg-config
          fi

      - name: Allow legacy cmake_minimum_required (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        # The vendored libopus CMakeLists.txt declares `cmake_minimum_required(<3.5)`,
        # which the runner's cmake ≥4 refuses. The escape hatch is documented
        # by CMake itself: `CMAKE_POLICY_VERSION_MINIMUM=3.5` forgives it for
        # configure-time. Cheaper than installing libopus via vcpkg.
        run: Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_POLICY_VERSION_MINIMUM=3.5"

      - name: Build release binary
        run: cd rust && cargo build --release --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features
      - name: Prepare artifact
        shell: bash
        run: |
          src="rust/target/${{ matrix.target }}/release/kesha-engine"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then src="${src}.exe"; fi
          cp "$src" "${{ matrix.binary }}"

      # system_tts (#141): the Swift AVSpeechSynthesizer sidecar lives in
      # the build-script's OUT_DIR (rust/target/<target>/release/build/
      # kesha-engine-<hash>/out/say-avspeech). cargo doesn't expose a
      # stable path for it, so glob it out. Stage it next to the matrix
      # binary so the smoke-test step's sibling-lookup finds it, then
      # copy to the release artifact name.
      - name: Stage AVSpeech sidecar (macOS)
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          sidecar=$(find "rust/target/${{ matrix.target }}/release/build" -name say-avspeech -type f | head -1)
          if [ -z "$sidecar" ]; then
            echo "say-avspeech sidecar not found — system_tts feature may not have compiled" >&2
            exit 1
          fi
          echo "Sidecar at: $sidecar"
          cp "$sidecar" ./say-avspeech              # sibling-next-to-engine for smoke test
          cp "$sidecar" say-avspeech-darwin-arm64    # release artifact name

      # system_diarize (#199): the Swift kesha-diarize sidecar lives in the
      # same OUT_DIR shape as AVSpeech. Same find-and-stage pattern; sibling
      # placement is what rust/src/transcribe/diarize.rs::sidecar_path
      # probes for, both at smoke time and at runtime in shipped releases.
      - name: Stage kesha-diarize sidecar (macOS)
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          sidecar=$(find "rust/target/${{ matrix.target }}/release/build" -name kesha-diarize -type f | head -1)
          if [ -z "$sidecar" ]; then
            echo "kesha-diarize sidecar not found — system_diarize feature may not have compiled" >&2
            exit 1
          fi
          echo "Sidecar at: $sidecar"
          cp "$sidecar" ./kesha-diarize-darwin-arm64    # sibling-next-to-engine for smoke test
          # The runtime probe (sidecar_path) tries kesha-diarize-darwin-arm64
          # first, then plain kesha-diarize. The release-asset name is the
          # platform-suffixed one — same convention as say-avspeech-*.

      # detect-text-lang fast-path sidecar: replaces the per-call `swift -e`
      # shell-out. Always built on macOS by `rust/build.rs::build_text_lang_helper`
      # (no feature gate; `text_lang` itself is macOS-only at runtime).
      - name: Stage kesha-textlang sidecar (macOS)
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          sidecar=$(find "rust/target/${{ matrix.target }}/release/build" -name kesha-textlang -type f | head -1)
          if [ -z "$sidecar" ]; then
            echo "kesha-textlang sidecar not found — build.rs::build_text_lang_helper may have failed" >&2
            exit 1
          fi
          echo "Sidecar at: $sidecar"
          cp "$sidecar" ./kesha-textlang                # sibling-next-to-engine for smoke test
          cp "$sidecar" kesha-textlang-darwin-arm64     # release artifact name

      - name: Smoke-test binary
        shell: bash
        # Assert `tts` is in the capabilities — otherwise a future feature-flag
        # regression (e.g. matrix row silently drops `tts`) would ship a
        # release binary missing `kesha say`. Past incident this guards
        # against: v1.1.0 → v1.1.3, see CLAUDE.md "BUILD-ENGINE FEATURE
        # MATRIX MIRRORS CARGO DEFAULTS".
        #
        # macOS additionally checks that `say --list-voices` surfaces at
        # least one `macos-*` entry — that exercises the Swift sidecar's
        # --list-voices mode end-to-end, so a broken sidecar fails the
        # build instead of shipping in a release.
        run: |
          chmod +x "${{ matrix.binary }}"
          caps=$("./${{ matrix.binary }}" --capabilities-json)
          echo "$caps"
          echo "$caps" | grep -q '"tts"' || {
            echo "expected tts in capabilities, got: $caps" >&2
            exit 1
          }
          if [ "${{ matrix.os }}" = "macos-14" ]; then
            voices=$("./${{ matrix.binary }}" say --list-voices)
            echo "$voices" | grep -q '^macos-' || {
              echo "expected at least one macos-* voice, got:" >&2
              echo "$voices" >&2
              exit 1
            }
            # #199: same matrix-drift guard as `tts` above. transcribe.diarize
            # is gated on system_diarize; if a future matrix edit drops the
            # feature, this assertion is the last gate before a release.
            echo "$caps" | grep -q '"transcribe\.diarize"' || {
              echo "expected transcribe.diarize in capabilities, got: $caps" >&2
              exit 1
            }
            # text-lang sidecar e2e: exercise the spawn → stdin → JSON
            # contract end-to-end so a broken sidecar packaging fails the
            # build instead of shipping in a release. `detect-text-lang`
            # accepts the text as argv (not stdin) — argv is forwarded into
            # the sidecar's stdin inside the Rust glue.
            lang_json=$("./${{ matrix.binary }}" detect-text-lang "Hello world from the smoke test")
            echo "$lang_json"
            echo "$lang_json" | grep -q '"code"' || {
              echo "expected detect-text-lang to emit JSON with a 'code' field, got: $lang_json" >&2
              exit 1
            }
          fi

      - name: Inspect macOS dynamic deps
        if: matrix.os == 'macos-14'
        shell: bash
        run: otool -L "${{ matrix.binary }}" && otool -l "${{ matrix.binary }}" | grep -A2 LC_RPATH || true

      - name: Upload engine artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

      - name: Upload AVSpeech sidecar (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v7
        with:
          name: say-avspeech-darwin-arm64
          path: say-avspeech-darwin-arm64

      - name: Upload kesha-diarize sidecar (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v7
        with:
          name: kesha-diarize-darwin-arm64
          path: kesha-diarize-darwin-arm64

      - name: Upload kesha-textlang sidecar (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v7
        with:
          name: kesha-textlang-darwin-arm64
          path: kesha-textlang-darwin-arm64

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create draft release with binaries
        uses: softprops/action-gh-release@v3
        with:
          files: |
            kesha-engine-darwin-arm64
            kesha-engine-linux-x64
            kesha-engine-windows-x64.exe
            say-avspeech-darwin-arm64
            kesha-diarize-darwin-arm64
            kesha-textlang-darwin-arm64
          draft: true

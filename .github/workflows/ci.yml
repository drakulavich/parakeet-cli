name: 🧪 CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  # Flakiness.io CLI authenticates via GitHub's OIDC provider, no
  # long-lived secret needed. Granted across all jobs so each test step
  # can convert+upload its own junit.xml under matrix.os.
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      integration: ${{ steps.filter.outputs.integration }}
      tts_e2e: ${{ steps.filter.outputs.tts_e2e }}
      raycast: ${{ steps.filter.outputs.raycast }}
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔍 Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          # Filter design (post-#280):
          # - `code` is the SUPERSET. Anything that should trigger TS unit-tests
          #   sits here. `integration` is a STRICT SUBSET of `code` so whenever
          #   `integration-tests` fires, `unit-tests` is guaranteed to fire too
          #   — the `needs: unit-tests` gate then evaluates predictably without
          #   the skip-propagation hazard that #274 + the pre-rewrite of #280
          #   silently fell into.
          # - `tts_e2e` is its own filter: rust + the TS files that drive the
          #   say-e2e test. It is INDEPENDENT — no `unit-tests` gate, because a
          #   rust-only PR (`code == 'false'`) still needs the e2e to run.
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'fixtures/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            integration:
              - 'src/**'
              - 'tests/integration/**'
              - 'fixtures/**'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            tts_e2e:
              - 'src/**'
              - 'tests/integration/say-e2e.test.ts'
              - 'rust/**'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            raycast:
              - 'raycast/**'
              - '.github/workflows/ci.yml'
            nix:
              - 'flake.nix'
              - 'flake.lock'
              - 'rust/**'
              - 'package.json'
              - '.github/workflows/ci.yml'

  unit-tests:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 🔍 Type check
        if: matrix.os == 'ubuntu-latest'
        run: bunx tsc --noEmit

      - name: 🔬 Type check (tsgo / TS 7 preview, advisory)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: bunx tsgo --noEmit

      - name: 🧪 Unit tests
        run: mkdir -p test-results && bun run test:unit --reporter=junit --reporter-outfile=test-results/unit-${{ matrix.os }}.xml

      - name: 📊 Test summary
        if: always()
        shell: bash
        run: bun .github/scripts/junit-to-markdown.ts "Unit Tests (${{ matrix.os }})" test-results/unit-${{ matrix.os }}.xml >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/unit-${{ matrix.os }}.xml
          retention-days: 7

      - name: 🪼 Upload to Flakiness.io
        if: always()
        shell: bash
        run: |
          bunx flakiness convert-junit test-results/unit-${{ matrix.os }}.xml \
            --category bun --project Laputa/kesha-voice-kit
          bunx flakiness upload ./flakiness-report

  integration-tests:
    # Skip on release/* branches: this job downloads the released engine
    # binary (the version in `package.json#keshaEngine.version`), which
    # doesn't exist yet on a version-bump PR — the tag is pushed AFTER
    # merge per the CLAUDE.md release flow. All other jobs either build
    # from source (tts-e2e) or test code directly (unit/rust-test), so
    # end-to-end-against-published coverage is the one thing we skip.
    #
    # Fail-fast: gate on `unit-tests` so a `tsc --noEmit` failure cancels
    # this 5-10 min lane. Safe because `integration` is a strict subset of
    # `code` (see filter design above) — when `integration == 'true'`,
    # `code == 'true'`, so `unit-tests` is never `skipped` here and the
    # standard `result == 'success'` gate is enough.
    needs: [changes, unit-tests]
    if: |
      needs.changes.outputs.integration == 'true' &&
      !startsWith(github.head_ref, 'release/') &&
      needs.unit-tests.result == 'success'
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 🔊 Setup integration backend
        uses: ./.github/actions/install-parakeet-backend
        with:
          cache-path: |
            ~/.cache/kesha
          cache-key: ${{ runner.os }}-kesha-engine-v1
          cache-restore-keys: ${{ runner.os }}-kesha-engine-

      - name: 🧪 Integration tests
        run: mkdir -p test-results && bun run test:integration --reporter=junit --reporter-outfile=test-results/integration.xml
        timeout-minutes: 10

      - name: 📊 Test summary
        if: always()
        run: bun .github/scripts/junit-to-markdown.ts "Integration Tests (macos)" test-results/integration.xml >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-integration
          path: test-results/integration.xml
          retention-days: 7

      - name: 🪼 Upload to Flakiness.io
        if: always()
        shell: bash
        run: |
          bunx flakiness convert-junit test-results/integration.xml \
            --category bun --project Laputa/kesha-voice-kit
          bunx flakiness upload ./flakiness-report

  tts-e2e:
    # Runs whenever rust engine code, the TS CLI that drives `kesha say`,
    # or the say-e2e test itself changes. No `unit-tests` gate: a rust-only
    # PR has `code == 'false'`, `unit-tests` is skipped, and GitHub Actions
    # skip-propagation would silently skip a downstream gate even with
    # `result == 'skipped'` in the `if:` — the latent bug behind #274 that
    # made rust-only PRs miss tts-e2e coverage for ~a session. Path filter
    # alone is the contract.
    needs: changes
    if: needs.changes.outputs.tts_e2e == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      KOKORO_CACHE: ${{ github.workspace }}/.kokoro-spike
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: 💾 Cache Kokoro models
        uses: actions/cache@v5
        with:
          path: ${{ env.KOKORO_CACHE }}
          key: kokoro-spike-v5-${{ runner.os }}

      - name: 📥 Download Kokoro models (if cache miss)
        run: bash rust/ci/download-kokoro.sh "$KOKORO_CACHE"

      - name: 🎧 Install system Opus
        # audiopus_sys / opusic-sys fall back to a cmake build of vendored
        # libopus when pkg-config can't locate it, and the vendored
        # CMakeLists.txt is incompatible with macOS runner cmake ≥4. Install
        # the system lib so pkg-config succeeds and cmake never runs.
        run: brew install opus pkg-config

      - name: 🦀 Build kesha-engine from source (with TTS)
        env:
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
          RUSTFLAGS: "-L /opt/homebrew/lib"
        run: cd rust && cargo build --release

      - name: 🧪 TTS e2e tests
        env:
          KOKORO_MODEL: ${{ env.KOKORO_CACHE }}/model.onnx
          KOKORO_VOICE: ${{ env.KOKORO_CACHE }}/am_michael.bin
          # Vosk-ru lives under this dir (see rust/ci/download-kokoro.sh)
          # — runtime loader resolves it via `models::vosk_ru_model_dir()`.
          KESHA_CACHE_DIR: ${{ env.KOKORO_CACHE }}
          KESHA_ENGINE_BIN: ${{ github.workspace }}/rust/target/release/kesha-engine
          DYLD_FALLBACK_LIBRARY_PATH: /opt/homebrew/lib
        run: |
          mkdir -p test-results
          bun test tests/integration/say-e2e.test.ts \
            --reporter=junit --reporter-outfile=test-results/tts-e2e.xml

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-tts-e2e
          path: test-results/tts-e2e.xml
          retention-days: 7

      - name: 🪼 Upload to Flakiness.io
        if: always()
        shell: bash
        run: |
          bunx flakiness convert-junit test-results/tts-e2e.xml \
            --category bun --project Laputa/kesha-voice-kit
          bunx flakiness upload ./flakiness-report

  raycast-lint:
    needs: changes
    if: needs.changes.outputs.raycast == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: raycast
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: raycast/package-lock.json

      - name: 📦 Install
        run: npm ci

      - name: 🔍 Lint (ray lint includes tsc --noEmit)
        run: npm run lint

  # Supplementary check: verify the Nix flake still evaluates and the
  # engine derivation builds. Catches regressions in `flake.nix` /
  # naersk / ort-sys env-var wiring before they reach main. Does NOT
  # replace `build-engine.yml` — distributable release artifacts
  # continue to go through Github-runner cargo + Swift toolchain pins.
  #
  # Currently builds only `.#kesha-engine`. The Bun wrapper package
  # `.#kesha` uses a fixed-output derivation whose `outputHash` requires
  # a nix-equipped developer to populate (see flake.nix `keshaNodeModules`
  # block + #264 plan T5); CI without that hash can't build it.
  #
  # macos-14 is Apple Silicon (aarch64-darwin). It exercises the Darwin-
  # only flake paths: Swift toolchain via nixpkgs, the Apple SDK
  # frameworks input, and the `say-avspeech` Swift sidecar stage-in
  # inside the engine derivation's postInstall. The lane uses the
  # `onnx,tts,system_tts` feature set — not `coreml,tts,system_tts` —
  # because `fluidaudio-rs`'s build.rs invokes `swift build`, which
  # tries to clone FluidAudio.git inside the offline Nix sandbox.
  # The canonical darwin release (build-engine.yml, pinned Xcode 16.2)
  # still ships the CoreML backend.
  nix-build:
    needs: changes
    if: needs.changes.outputs.nix == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: ❄️  Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      # No remote Nix cache: DeterminateSystems retired the free
      # `magic-nix-cache-action` backend (the macos-14 row of this job hung
      # in `Setup Nix cache` for the full 35-min timeout). FlakeHub Cache
      # works but requires auth; revisit if cold builds become painful.

      - name: 🔍 Validate flake metadata
        run: nix flake metadata --no-update-lock-file

      - name: 🦀 Build kesha-engine
        run: nix build .#kesha-engine --no-update-lock-file -L

      - name: 🚬 Smoke
        run: ./result/bin/kesha-engine --version

  pr-comment:
    if: always() && github.event_name == 'pull_request' && (needs.unit-tests.result == 'success' || needs.integration-tests.result == 'success' || needs.tts-e2e.result == 'success')
    needs: [unit-tests, integration-tests, tts-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🍞 Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: 📥 Download all test results
        uses: actions/download-artifact@v8
        with:
          path: all-results
          pattern: test-results-*

      - name: 📝 Generate PR comment
        run: bun .github/scripts/generate-pr-comment.ts all-results /tmp/pr-comment.md

      - name: 💬 Post PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          path: /tmp/pr-comment.md
